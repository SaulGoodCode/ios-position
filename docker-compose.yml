# ============================================================
# Docker Compose - iOS Location Spoofing Service
# ============================================================
#
# Services:
#   api      - FastAPI backend + web frontend
#   proxy    - MITM proxy for location interception
#
# NOTE: The VPN server (strongSwan) runs on the host machine,
# not in Docker, because it needs kernel-level IPsec support.
# Run vpn/setup_vpn.sh on the host to set up the VPN.
# ============================================================

version: "3.8"

services:
  # ----------------------------------------------------------
  # FastAPI Backend + Web Frontend
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: locspoof-api
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./certs:/app/certs:ro
      - ./data:/app/data
    environment:
      - SERVER_DOMAIN=${SERVER_DOMAIN:-locspoof.local}
      - VPN_HOST=${VPN_HOST:-vpn.locspoof.local}
      - API_HOST=${API_HOST:-api.locspoof.local}
      - VPN_USERNAME=${VPN_USERNAME:-user@locspoof.local}
      - VPN_PASSWORD=${VPN_PASSWORD:-changeme}
      - PROFILE_SECRET=${PROFILE_SECRET:-dev-secret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------
  # MITM Proxy (mitmproxy)
  # ----------------------------------------------------------
  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    container_name: locspoof-proxy
    ports:
      - "8443:8443"
    volumes:
      - ./certs:/app/certs:ro
      - ./proxy/addons:/app/addons:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    # Allow proxy to reach API container
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------------------------------------------------------
  # Nginx reverse proxy (optional, for production)
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: locspoof-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - proxy
    restart: unless-stopped
    profiles:
      - production
