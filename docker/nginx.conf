# ============================================================
# Nginx configuration for LocSpoof (production)
# ============================================================
# Handles:
#   - Web frontend and API on port 80/443
#   - PAC file serving
#   - .mobileconfig download
#   - Reverse proxy to MITM proxy
# ============================================================

upstream api_backend {
    server api:8000;
}

upstream mitm_proxy {
    server proxy:8443;
}

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # Use your real SSL certificates here
    # For development, use self-signed or Let's Encrypt
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Web frontend
    location / {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # PAC file
    location /proxy.pac {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        # Disable caching for PAC
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Config profile download
    location /install.mobileconfig {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://api_backend;
    }
}
