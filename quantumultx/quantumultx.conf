# ============================================================
# LocSpoof — Quantumult X 配置片段
# 
# 功能：拦截 Apple Wi-Fi 定位响应，替换坐标为伪造值
# 使用：将以下内容追加到 Quantumult X 对应配置段
# ============================================================

# -------- [rewrite_local] 段 --------
# 使用 script-response-body：
#   请求先转发给 Apple → Apple 返回真实 BSSID+坐标 → 脚本替换坐标
#   这样 iPhone 看到响应中的 BSSID 和自己扫描的一致 → 信任定位结果

[rewrite_local]
^https://gs-loc\.apple\.com/clls/wloc url script-response-body https://raw.githubusercontent.com/SaulGoodCode/ios-position/main/quantumultx/fake_wloc.js
^https://gs-loc-cn\.apple\.com/clls/wloc url script-response-body https://raw.githubusercontent.com/SaulGoodCode/ios-position/main/quantumultx/fake_wloc.js


# -------- [mitm] 段 --------
# 必须开启对 Apple 定位域名的 MITM 解密

[mitm]
hostname = gs-loc.apple.com, gs-loc-cn.apple.com


