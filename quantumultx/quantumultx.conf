# ============================================================
# LocSpoof — Quantumult X 配置片段
# 
# 功能：拦截 Apple Wi-Fi 定位请求，返回伪造坐标
# 使用：将以下内容追加到 Quantumult X 对应配置段
# ============================================================

# -------- [rewrite_local] 段 --------
# 使用 script-echo-response：直接拦截请求并返回自定义响应，不转发给 Apple
# require-body=1：让 QX 把请求体传给脚本（用于解析 WiFi BSSIDs）
# binary-body-mode=1：请求体以二进制模式传递（$request.bodyBytes）

[rewrite_local]
^https://gs-loc\.apple\.com/clls/wloc url script-echo-response https://raw.githubusercontent.com/SaulGoodCode/ios-position/refs/heads/main/quantumultx/fake_wloc.js, require-body=1, binary-body-mode=1
^https://gs-loc-cn\.apple\.com/clls/wloc url script-echo-response https://raw.githubusercontent.com/SaulGoodCode/ios-position/refs/heads/main/quantumultx/fake_wloc.js, require-body=1, binary-body-mode=1


# -------- [mitm] 段 --------
# 必须开启对 Apple 定位域名的 MITM 解密

[mitm]
hostname = gs-loc.apple.com, gs-loc-cn.apple.com


# ============================================================
# 如果你使用本地脚本（不用远程 URL）：
# 将 fake_wloc.js 放到 iCloud/Quantumult X/Scripts/ 目录
# 然后改为本地路径：
#
# ^https://gs-loc\.apple\.com/clls/wloc url script-echo-response fake_wloc.js, require-body=1, binary-body-mode=1
# ^https://gs-loc-cn\.apple\.com/clls/wloc url script-echo-response fake_wloc.js, require-body=1, binary-body-mode=1
# ============================================================
